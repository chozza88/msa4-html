<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>form tng</title>
  </head>
  <body>
    <div class="wrap">
      <h1>회원가입을 환영합니다.</h1>
      <form action="#" method="post">
        <fieldset>
          <legend>사용자 정보</legend>
          <ul>
            <li>
              <label for="ID">아이디</label>
              <input
                type="text"
                name="ID"
                id="ID"
                minlength="4"
                maxlength="10"
                placeholder="4자 ~ 10자 사이, 공백없이"
              />
            </li>
            <li>
              <label for="email">이메일</label>
              <input type="email" name="email" id="email" />
            </li>
            <li>
              <label for="PW">비밀번호</label>
              <input
                type="password"
                name="PW"
                id="PW"
                placeholder="문자와 숫자, 특수 기호 포함"
              />
            </li>
            <li>
              <label for="pwA">비밀번호 확인</label>
              <input type="password" name="pwA" id="pwA" />
            </li>
            <li>
              <label for="memberRoad">가입 경로</label>
              <select name="memberRoad" id="memberRoad">
                <option value="internet">인터넷</option>
                <option value="friend">친구 추천</option>
                <option value="random" selected>기타</option>
              </select>
            </li>
            <li>
              <label for="memo">메모</label>
              <textarea
                name="memo"
                id="memo"
                cols="40"
                rows="15"
                placeholder="남길 말씀이 있다면여기에"
              ></textarea>
            </li>
          </ul>
        </fieldset>
        <fieldset>
          <legend>이벤트와 새로운 소식</legend>
          <div>
            <input type="radio" name="mailConfirm" id="mailOk" value="Y" />
            <label for="mailOk">메일수신</label>
            <input
              type="radio"
              name="mailConfirm"
              id="mailNo"
              value="N"
              checked
            />
            <label for="mailNo">메일 수신 안 함</label>
          </div>
        </fieldset>
        <input type="submit" value="가입하기" />
        <input type="reset" value="취소" />
      </form>
    </div>
  </body>
</html>
